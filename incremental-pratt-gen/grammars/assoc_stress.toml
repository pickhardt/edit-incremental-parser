# Associativity-conflict stress grammar — four associativity-conflict
# operators at distinct precedences, so deep chains build balanced trees
# at every level. This is the configuration where the historical interior-
# stop_lbp soundness bug lived; passing the oracle here is the convincing
# evidence that the generated balanced builder propagates metadata
# correctly. Weak operators (-, /) interleave to mix the dispatch paths.
name = "assoc_stress"

[atoms]
int = true

[paren]
open = "("
close = ")"

[[prefix]]
sym = "-"
rbp = 100

[[infix]]
sym = "|"
lbp = 20
assoc = "left"
class = "assoc"

[[infix]]
sym = "&"
lbp = 30
assoc = "left"
class = "assoc"

[[infix]]
sym = "+"
lbp = 50
assoc = "left"
class = "assoc"

[[infix]]
sym = "-"
lbp = 50
assoc = "left"
class = "weak"

[[infix]]
sym = "*"
lbp = 60
assoc = "left"
class = "assoc"

[[infix]]
sym = "/"
lbp = 60
assoc = "left"
class = "weak"
